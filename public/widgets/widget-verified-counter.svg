<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240">
  <!-- Background -->
  <rect width="400" height="240" fill="#b8e8bc"/>
  <defs>
    <pattern id="stripe" width="14" height="14" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="14" stroke="white" stroke-width="3.5" stroke-opacity="0.18"/>
    </pattern>
  </defs>
  <rect width="400" height="240" fill="url(#stripe)"/>

  <!-- White card -->
  <rect x="52" y="28" width="296" height="184" rx="14" fill="white"/>

  <!-- Row: circle-check + 4.8 + stars -->
  <circle cx="116" cy="90" r="15" fill="none" stroke="#1a3462" stroke-width="2.4"/>
  <polyline points="109,90 115,96 124,83" fill="none" stroke="#1a3462" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="140" y="98" font-family="Inter,Arial,sans-serif" font-size="21" font-weight="700" fill="#1a3462">4.8</text>
  <text x="174" y="100" font-family="Arial,sans-serif" font-size="21" fill="#1a3462">★★★★★</text>

  <!-- Two green progress bars -->
  <rect x="78" y="118" width="234" height="10" rx="5" fill="#3dd68c"/>
  <rect x="78" y="138" width="162" height="10" rx="5" fill="#3dd68c"/>

  <!-- Verified by [checkbox] rayt.ca -->
  <text x="112" y="186" font-family="Inter,Arial,sans-serif" font-size="13" fill="#666">Verified by</text>
  <rect x="186" y="173" width="17" height="17" rx="3" fill="#1a3462"/>
  <polyline points="189.5,181.5 193,185 202,175.5" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="208" y="186" font-family="Inter,Arial,sans-serif" font-size="13" font-weight="600" fill="#1a3462">rayt.ca</text>
</svg>
