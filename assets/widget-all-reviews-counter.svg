<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240">
  <!-- Background -->
  <rect width="400" height="240" fill="#a8d4f0"/>
  <defs>
    <pattern id="stripe" width="14" height="14" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="14" stroke="white" stroke-width="3.5" stroke-opacity="0.18"/>
    </pattern>
  </defs>
  <rect width="400" height="240" fill="url(#stripe)"/>

  <!-- White card -->
  <rect x="52" y="34" width="296" height="172" rx="14" fill="white"/>

  <!-- Crown circle badge — r=19 (50% of r=38), shifted up to cy=82 -->
  <circle cx="148" cy="82" r="25" fill="none" stroke="#1a3462" stroke-width="2"/>
  <!-- Crown shape inside the smaller circle (scaled to r=21) -->
  <path d="M135,82 L135,72 L140,77 L148,63 L156,77 L161,72 L161,82 Z" fill="#1a3462"/>
  <circle cx="135" cy="72" r="1.2" fill="#1a3462"/>
  <circle cx="148" cy="63" r="1.2" fill="#1a3462"/>
  <circle cx="161" cy="72" r="1.2" fill="#1a3462"/>
  <!-- 786 -->
  <text x="148" y="96" font-family="Inter,Arial,sans-serif" font-size="10" font-weight="700" fill="#1a3462" text-anchor="middle">786</text>
  <!-- VERIFIED REVIEWS — below the circle -->
  <text x="148" y="120" font-family="Inter,Arial,sans-serif" font-size="6" font-weight="600" fill="#1a3462" text-anchor="middle" letter-spacing="0.5">VERIFIED REVIEWS</text>

  <!-- "by [checkbox] rayt.ca" — aligned to circle center cy=82, text reduced 10% -->
  <text x="182" y="86" font-family="Inter,Arial,sans-serif" font-size="12" fill="#888">by</text>
  <!-- Checkbox badge centered at cy=82 -->
  <rect x="198" y="75" width="14" height="14" rx="3" fill="#1a3462"/>
  <polyline points="201,82 204,85 210.5,78" fill="none" stroke="white" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- rayt.ca -->
  <text x="216" y="86" font-family="Inter,Arial,sans-serif" font-size="13" font-weight="600" fill="#1a3462">rayt.ca</text>

  <!-- Two green bars -->
  <rect x="80" y="148" width="222" height="10" rx="5" fill="#3dd68c"/>
  <rect x="80" y="166" width="155" height="10" rx="5" fill="#3dd68c"/>
</svg>
